name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          # Aquí inyectamos tus colores exactos: bg_color, title_color, text_color, icon_color y hide_border
          options: username=${{ github.repository_owner }}&show_icons=true&bg_color=0d1117&title_color=2ea44f&text_color=8b949e&icon_color=2ea44f&hide_border=false
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          # Añadimos tus mismos estilos respetando el layout=compact y langs_count
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=5&card_width=320&bg_color=0d1117&title_color=2ea44f&text_color=8b949e&icon_color=2ea44f&hide_border=false
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards with custom theme" || exit 0
          git push
